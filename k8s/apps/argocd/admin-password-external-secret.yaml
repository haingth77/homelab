apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-admin-password
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    # Merge into the existing argocd-secret rather than replacing it.
    # ArgoCD Helm already owns this secret; we only overwrite admin.password.
    creationPolicy: Merge
  data:
    - secretKey: admin.password
      remoteRef:
        # Store the bcrypt hash of your desired password in Infisical.
        # Generate with: htpasswd -bnBC 10 "" <password> | tr -d ':\n'
        # Or:  python3 -c "import bcrypt; print(bcrypt.hashpw(b'<password>', bcrypt.gensalt(10)).decode())"
        key: ARGOCD_ADMIN_PASSWORD_BCRYPT
