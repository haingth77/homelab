apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-demo
  namespace: argocd
  labels:
    app.kubernetes.io/name: hello-demo
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: demo
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/holdennguyen/homelab.git
    targetRevision: HEAD
    path: k8s/apps/hello-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true