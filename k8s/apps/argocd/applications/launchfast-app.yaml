apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: launchfast
  namespace: argocd
  labels:
    app.kubernetes.io/name: launchfast
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/haingth77/homelab.git
    targetRevision: HEAD
    path: k8s/apps/launchfast
  destination:
    server: https://kubernetes.default.svc
    namespace: launchfast
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
