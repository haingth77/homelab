apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.1.0
    helm:
      valuesObject:
        # Grafana
        grafana:
          adminPassword: admin
          service:
            type: NodePort
            nodePort: 30090
          persistence:
            enabled: true
            size: 2Gi
          defaultDashboardsEnabled: true
          sidecar:
            dashboards:
              enabled: true
            datasources:
              enabled: true

        # Prometheus
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi

        # Alertmanager
        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi

        # Node exporter
        nodeExporter:
          enabled: true

        # kube-state-metrics
        kubeStateMetrics:
          enabled: true

        # Disable components that don't apply to OrbStack single-node
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
