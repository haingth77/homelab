apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/managed-by: argocd
spec:
  project: apps
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 82.1.0
    helm:
      valuesObject:
        # Grafana
        grafana:
          admin:
            existingSecret: grafana-secret
            passwordKey: admin-password
          service:
            type: NodePort
            nodePort: 30090
          persistence:
            enabled: true
            size: 2Gi
          initChownData:
            enabled: false
          securityContext:
            runAsUser: 472
            runAsGroup: 472
            fsGroup: 472
          envFromSecrets:
            - name: grafana-secret
              optional: false
          grafana.ini:
            server:
              root_url: https://holdens-mac-mini.story-larch.ts.net:8444
            auth:
              disable_login_form: true
            auth.generic_oauth:
              enabled: true
              name: Authentik
              allow_sign_up: true
              client_id: $__file{/etc/secrets/oauth-client-id}
              client_secret: $__file{/etc/secrets/oauth-client-secret}
              scopes: openid email profile
              auth_url: https://holdens-mac-mini.story-larch.ts.net/application/o/authorize/
              token_url: https://holdens-mac-mini.story-larch.ts.net/application/o/token/
              api_url: https://holdens-mac-mini.story-larch.ts.net/application/o/userinfo
              role_attribute_path: contains(groups[*], 'authentik Admins') && 'Admin' || 'Viewer'
              auto_login: true
          extraSecretMounts:
            - name: oauth-secret
              secretName: grafana-secret
              mountPath: /etc/secrets
              readOnly: true
          defaultDashboardsEnabled: true
          sidecar:
            dashboards:
              enabled: true
            datasources:
              enabled: true

        # Prometheus
        prometheus:
          prometheusSpec:
            securityContext:
              runAsUser: 65534
              runAsGroup: 65534
              runAsNonRoot: true
              fsGroup: 65534
            # Set explicit global scrape and evaluation intervals to reduce resource usage
            scrapeInterval: "60s"
            evaluationInterval: "60s"
            retention: 15d
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi

        # Alertmanager
        alertmanager:
          alertmanagerSpec:
            securityContext:
              runAsUser: 1000
              runAsGroup: 2000
              runAsNonRoot: true
              fsGroup: 2000
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
            storage:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi

        # Node exporter
        nodeExporter:
          enabled: true

        # kube-state-metrics
        kubeStateMetrics:
          enabled: true

        # Disable components that don't apply to OrbStack single-node
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeControllerManager:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
