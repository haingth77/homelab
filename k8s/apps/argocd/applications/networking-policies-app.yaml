apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networking-policies
  namespace: argocd
  labels:
    app.kubernetes.io/name: networking-policies
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: networking
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/haingth77/homelab.git
    targetRevision: HEAD
    path: k8s/apps/networking-policies
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
