apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
  labels:
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: apps
  source:
    repoURL: https://aquasecurity.github.io/helm-charts
    chart: trivy-operator
    targetRevision: 0.32.0
    helm:
      valuesObject:
        # Run the operator with limited resources; it's lightweight.
        operator:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        # Enable the vulnerability reports (enabled by default)
        trivy:
          # Configure to scan images of running pods
          ignoreUnfixed: false
          # Optionally, config for severity levels; use defaults.
        # The operator creates VulnerabilityReport CRDs per pod. They can be viewed via kubectl.
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
