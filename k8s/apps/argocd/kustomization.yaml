apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# ArgoCD itself is installed by Terraform (terraform/argocd.tf).
# This kustomization only contains the child Application CRs that ArgoCD
# manages after the bootstrap — the App of Apps pattern.
resources:
  # AppProjects (sync-wave -1) — must exist before Applications reference them.
  - projects/secrets.yaml
  - projects/data.yaml
  - projects/apps.yaml
  # infisical-app is managed by Terraform (terraform/argocd.tf) not by this kustomization.
  # This is intentional: Infisical carries sensitive Helm values (postgres/redis passwords)
  # that cannot be stored in git.
  - applications/external-secrets-app.yaml
  - applications/external-secrets-config-app.yaml
  - applications/monitoring-app.yaml
  - applications/monitoring-config-app.yaml
  - applications/authentik-app.yaml
  - applications/authentik-config-app.yaml
  - applications/openclaw-app.yaml
  - applications/networking-policies-app.yaml
  - applications/namespace-security-app.yaml
  - applications/trivy-operator-app.yaml
  - applications/trivy-dashboard-app.yaml
  - applications/launchfast-app.yaml
  - applications/hello-demo-app.yaml
  - applications/hello-world-app.yaml
