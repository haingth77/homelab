apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  bookmarks.yaml: |
    version: 1
    entries:
      - model: authentik_core.application
        id: app-infisical
        state: present
        identifiers:
          slug: infisical
        attrs:
          name: Infisical
          group: Infrastructure
          meta_launch_url: https://holdens-mac-mini.story-larch.ts.net:8445
          meta_icon: https://avatars.githubusercontent.com/u/107880645?s=48&v=4
          meta_description: Secret Management Platform
          meta_publisher: Homelab
      - model: authentik_core.application
        id: app-mkdocs
        state: present
        identifiers:
          slug: mkdocs
        attrs:
          name: Homelab Docs
          group: Documentation
          meta_launch_url: https://holdennguyen.github.io/homelab
          meta_icon: https://avatars.githubusercontent.com/u/9692741?s=48&v=4
          meta_description: Homelab Documentation
          meta_publisher: Homelab
      - model: authentik_core.application
        id: app-trivy
        state: present
        identifiers:
          slug: trivy
        attrs:
          name: Trivy Dashboard
          group: Security
          meta_launch_url: https://holdens-mac-mini.story-larch.ts.net:8448
          meta_icon: https://avatars.githubusercontent.com/u/12783832?s=48&v=4
          meta_description: Trivy Operator Security Dashboard
          meta_publisher: Homelab
      - model: authentik_core.application
        id: app-openclaw
        state: present
        identifiers:
          slug: openclaw
        attrs:
          name: OpenClaw
          group: AI
          meta_launch_url: https://holdens-mac-mini.story-larch.ts.net:8447
          meta_icon: https://avatars.githubusercontent.com/u/252820863?s=48&v=4
          meta_description: AI Agent Gateway Console
          meta_publisher: Homelab
      - model: authentik_providers_oauth2.oauth2provider
        id: provider-vikunja
        state: present
        identifiers:
          name: vikunja
        attrs:
          name: vikunja
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          client_type: confidential
          client_id: vikunja
          redirect_uris: |
            https://holdens-mac-mini.story-larch.ts.net:8449/auth/openid/authentik
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      - model: authentik_core.application
        id: app-vikunja
        state: present
        identifiers:
          slug: vikunja
        attrs:
          name: Vikunja
          slug: vikunja
          group: Productivity
          provider: !KeyOf provider-vikunja
          meta_launch_url: https://holdens-mac-mini.story-larch.ts.net:8449
          meta_icon: https://avatars.githubusercontent.com/u/41270016?s=200&v=4
          meta_description: Todo List & Task Management
          meta_publisher: Homelab
