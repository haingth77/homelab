apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secret
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/instance: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: authentik-secret
    creationPolicy: Owner
    template:
      data:
        AUTHENTIK_SECRET_KEY: "{{ .secretKey }}"
        AUTHENTIK_BOOTSTRAP_PASSWORD: "{{ .bootstrapPassword }}"
        AUTHENTIK_BOOTSTRAP_TOKEN: "{{ .bootstrapToken }}"
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .pgPassword }}"
        pg-password: "{{ .pgPassword }}"
        VIKUNJA_OIDC_CLIENT_SECRET: "{{ .vikunjaOidcClientSecret }}"
  data:
    - secretKey: secretKey
      remoteRef:
        key: AUTHENTIK_SECRET_KEY
    - secretKey: bootstrapPassword
      remoteRef:
        key: AUTHENTIK_BOOTSTRAP_PASSWORD
    - secretKey: bootstrapToken
      remoteRef:
        key: AUTHENTIK_BOOTSTRAP_TOKEN
    - secretKey: pgPassword
      remoteRef:
        key: AUTHENTIK_POSTGRES_PASSWORD
    - secretKey: vikunjaOidcClientSecret
      remoteRef:
        key: VIKUNJA_OIDC_CLIENT_SECRET
