apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      # Internal cluster DNS for the Infisical service deployed by ArgoCD.
      # No /api suffix needed — ESO appends the correct path internally.
      hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080
      auth:
        universalAuthCredentials:
          clientId:
            key: clientId
            name: infisical-machine-identity
            namespace: external-secrets
          clientSecret:
            key: clientSecret
            name: infisical-machine-identity
            namespace: external-secrets
      # Create a project named "homelab" in the Infisical UI and copy its slug.
      # The default environment slugs created by Infisical are: dev, staging, prod.
      secretsScope:
        projectSlug: homelab
        environmentSlug: prod
        secretsPath: /
