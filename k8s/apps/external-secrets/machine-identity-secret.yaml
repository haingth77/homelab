apiVersion: v1
kind: Secret
metadata:
  name: infisical-machine-identity
  namespace: external-secrets
type: Opaque
stringData:
  # These values come from Infisical UI:
  # Settings > Machine Identities > Create Identity > Universal Auth
  # Replace these placeholders after creating the identity in Infisical
  clientId: "REPLACE_WITH_CLIENT_ID"
  clientSecret: "REPLACE_WITH_CLIENT_SECRET"
