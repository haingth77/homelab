---
# Minimal RBAC so the Job can exec into the running Gitea pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-admin-init
  namespace: gitea-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-admin-init
  namespace: gitea-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-admin-init
  namespace: gitea-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitea-admin-init
subjects:
  - kind: ServiceAccount
    name: gitea-admin-init
    namespace: gitea-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-admin-init
  namespace: gitea-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: gitea-admin-init
      containers:
        - name: create-admin
          # bitnami/kubectl provides kubectl, sh, and base64 without needing
          # Gitea's config file — we exec into the running pod as the git user.
          image: bitnami/kubectl:latest
          env:
            - name: GITEA_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gitea-admin-secret
                  key: GITEA_ADMIN_USERNAME
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-admin-secret
                  key: GITEA_ADMIN_PASSWORD
            - name: GITEA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gitea-admin-secret
                  key: GITEA_ADMIN_EMAIL
          command:
            - sh
            - -c
            - |
              set -e

              # Base64-encode credentials so they pass cleanly through the heredoc
              # with no special-character escaping issues inside the target pod.
              U=$(printf '%s' "${GITEA_ADMIN_USERNAME}" | base64 | tr -d '\n')
              P=$(printf '%s' "${GITEA_ADMIN_PASSWORD}" | base64 | tr -d '\n')
              E=$(printf '%s' "${GITEA_ADMIN_EMAIL}"    | base64 | tr -d '\n')

              # Wait until the Gitea pod is ready to accept CLI commands.
              echo "Waiting for Gitea to be ready..."
              until kubectl exec -n gitea-system deploy/gitea -- \
                  su git -s /bin/sh -c 'gitea admin user list' > /dev/null 2>&1; do
                sleep 5
              done
              echo "Gitea is ready."

              # Pipe a shell script into the running Gitea pod as the git user.
              # Credentials are base64-decoded inside the pod, never exposed as
              # plain-text process arguments or files.
              cat <<EOF | kubectl exec -i -n gitea-system deploy/gitea -- su git -s /bin/sh
              UNAME=\$(printf '%s' '${U}' | base64 -d)
              PWD=\$(printf '%s' '${P}' | base64 -d)
              EMAIL=\$(printf '%s' '${E}' | base64 -d)
              if gitea admin user list 2>/dev/null | grep -q "\$UNAME"; then
                echo "User '\$UNAME' already exists — updating password."
                gitea admin user change-password --username "\$UNAME" --password "\$PWD"
                echo "Password updated."
              else
                echo "Creating admin '\$UNAME'."
                gitea admin user create --admin \
                  --username "\$UNAME" \
                  --password "\$PWD" \
                  --email    "\$EMAIL" \
                  --must-change-password=false
                echo "Admin user created."
              fi
              EOF
