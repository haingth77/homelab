apiVersion: batch/v1
kind: Job
metadata:
  name: gitea-admin-init
  namespace: gitea-system
  annotations:
    # Run after every ArgoCD sync. The BeforeHookCreation policy deletes any
    # previous run of this Job before creating a new one, so it stays idempotent.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  # Retry up to 3 times in case Gitea is still running migrations on the first attempt.
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Copy app.ini from the ConfigMap into an emptyDir so the gitea CLI can
        # find it at $GITEA_WORK_DIR/conf/app.ini (ConfigMap mounts are read-only).
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /work/conf && cp /etc/gitea/app.ini /work/conf/app.ini
          volumeMounts:
            - name: gitea-config
              mountPath: /etc/gitea
              readOnly: true
            - name: work-dir
              mountPath: /work

      containers:
        - name: create-admin
          image: gitea/gitea:1.22
          env:
            - name: GITEA_WORK_DIR
              value: /work
            # Override the DB password the same way the main Deployment does.
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: GITEA_DB_PASSWORD
            - name: GITEA_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: gitea-admin-secret
                  key: GITEA_ADMIN_USERNAME
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gitea-admin-secret
                  key: GITEA_ADMIN_PASSWORD
            - name: GITEA_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: gitea-admin-secret
                  key: GITEA_ADMIN_EMAIL
          command:
            - sh
            - -c
            - |
              set -e

              # If the user already exists, just ensure the password is current.
              if gitea admin user list 2>/dev/null | grep -q "${GITEA_ADMIN_USERNAME}"; then
                echo "User '${GITEA_ADMIN_USERNAME}' already exists — updating password."
                gitea admin user change-password \
                  --username "${GITEA_ADMIN_USERNAME}" \
                  --password "${GITEA_ADMIN_PASSWORD}"
                echo "Password updated."
              else
                echo "Creating admin user '${GITEA_ADMIN_USERNAME}'."
                gitea admin user create \
                  --admin \
                  --username "${GITEA_ADMIN_USERNAME}" \
                  --password "${GITEA_ADMIN_PASSWORD}" \
                  --email    "${GITEA_ADMIN_EMAIL}" \
                  --must-change-password=false
                echo "Admin user created."
              fi
          volumeMounts:
            - name: work-dir
              mountPath: /work

      volumes:
        - name: gitea-config
          configMap:
            name: gitea-config
        - name: work-dir
          emptyDir: {}
