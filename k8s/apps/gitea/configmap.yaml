apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: gitea-system
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: gitea
data:
  app.ini: |
    APP_NAME = Gitea: Git with a cup of tea
    RUN_MODE = prod
    
    [database]
    DB_TYPE = postgres
    HOST = postgresql:5432
    USER = gitea
    NAME = gitea
    SCHEMA = public
    SSL_MODE = disable
    
    [server]
    HTTP_ADDR = 0.0.0.0
    HTTP_PORT = 3000
    ROOT_URL = https://holdens-mac-mini.story-larch.ts.net:8446/
    DISABLE_SSH = false
    START_SSH_SERVER = false
    SSH_DOMAIN = holdens-mac-mini.story-larch.ts.net
    SSH_PORT = 22
    SSH_LISTEN_PORT = 22
    LFS_START_SERVER = true
    
    [repository]
    ROOT = /data/git/repositories
    
    [security]
    INSTALL_LOCK = true
    ; SECRET_KEY is injected via GITEA__security__SECRET_KEY env var from gitea-secret
    
    [session]
    PROVIDER = File
    PROVIDER_CONFIG = /data/gitea/sessions
    
    [log]
    MODE = console
    LEVEL = info
    
    [queue]
    TYPE = channel
    
    [service]
    DISABLE_REGISTRATION = false
    ALLOW_ONLY_EXTERNAL_REGISTRATION = true
    ENABLE_NOTIFY_MAIL = false
    
    [openid]
    ENABLE_OPENID_SIGNIN = false
    ENABLE_OPENID_SIGNUP = true
    
    [oauth2_client]
    ENABLE_AUTO_REGISTRATION = true
    ACCOUNT_LINKING = auto
    USERNAME = nickname
