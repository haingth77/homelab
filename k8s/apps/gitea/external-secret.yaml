apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-secret
  namespace: gitea-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: gitea-secret
    creationPolicy: Owner
  data:
    - secretKey: GITEA_SECRET_KEY
      remoteRef:
        key: GITEA_SECRET_KEY
