apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: gitea-system
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: gitea
spec:
  type: ClusterIP # Use ClusterIP for internal access, or NodePort/LoadBalancer for external
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
    - port: 22
      targetPort: ssh
      protocol: TCP
      name: ssh
  selector:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/instance: gitea
