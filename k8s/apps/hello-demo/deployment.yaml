apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: hello-demo
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: demo
    app.kubernetes.io/managed-by: argocd
  name: hello-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hello-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hello-demo
    spec:
      containers:
      - name: hello-demo
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi