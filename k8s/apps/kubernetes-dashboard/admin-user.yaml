apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: kubernetes-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-user
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: admin-user
    namespace: kubernetes-dashboard
---
# Long-lived token for the admin-user ServiceAccount.
# Kubernetes auto-populates the `token` key when this Secret is created.
# Retrieve it with:
#   kubectl get secret admin-user-token -n kubernetes-dashboard \
#     -o jsonpath='{.data.token}' | base64 -d
# Then store the value in Infisical under key: KUBERNETES_DASHBOARD_TOKEN
apiVersion: v1
kind: Secret
metadata:
  name: admin-user-token
  namespace: kubernetes-dashboard
  annotations:
    kubernetes.io/service-account.name: admin-user
type: kubernetes.io/service-account-token
