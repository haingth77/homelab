apiVersion: v1
kind: ConfigMap
metadata:
  name: launchfast-landing
  namespace: launchfast
  labels:
    app.kubernetes.io/name: launchfast
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: argocd
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>LaunchFast — Modern Startup Scaffolding</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
          color: #e0e0e0;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }
        .container { text-align: center; max-width: 720px; padding: 2rem; }
        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem; }
        h1 span { background: linear-gradient(90deg, #6c63ff, #e040fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tagline { font-size: 1.25rem; line-height: 1.6; color: #b0b0b0; margin-bottom: 1.5rem; }
        .tech-grid {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 0.5rem;
          margin-bottom: 2rem;
        }
        .tech-tag {
          padding: 0.35rem 0.9rem;
          border: 1px solid rgba(108, 99, 255, 0.4);
          border-radius: 9999px;
          font-size: 0.8rem;
          color: #9d97ff;
          background: rgba(108, 99, 255, 0.08);
        }
        .badge {
          display: inline-block;
          padding: 0.5rem 1.5rem;
          border: 1px solid #6c63ff;
          border-radius: 9999px;
          font-size: 0.875rem;
          color: #6c63ff;
        }
        footer { position: fixed; bottom: 1rem; font-size: 0.75rem; color: #666; }
      </style>
    </head>
    <body>
      <div class="container">
        <h1><span>LaunchFast</span></h1>
        <p class="tagline">Scaffold production-ready startup projects with modern tech stacks &mdash; powered by AI agents and built for the future.</p>
        <div class="tech-grid">
          <span class="tech-tag">Go</span>
          <span class="tech-tag">Rust</span>
          <span class="tech-tag">WebAssembly</span>
          <span class="tech-tag">Vector DB</span>
          <span class="tech-tag">ML/AI</span>
          <span class="tech-tag">GitOps</span>
        </div>
        <div class="badge">Coming Soon</div>
      </div>
      <footer>Built with multi-agent coordination &bull; Deployed on homelab</footer>
    </body>
    </html>
  nginx.conf: |
    server {
      listen 8080;
      root /usr/share/nginx/html;
      index index.html;
      location /healthz { return 200 'ok'; add_header Content-Type text/plain; }
    }
