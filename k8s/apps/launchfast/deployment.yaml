apiVersion: apps/v1
kind: Deployment
metadata:
  name: launchfast
  namespace: launchfast
  labels:
    app.kubernetes.io/name: launchfast
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: launchfast
  template:
    metadata:
      labels:
        app.kubernetes.io/name: launchfast
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: html
          configMap:
            name: launchfast-landing
            items:
              - key: index.html
                path: index.html
        - name: nginx-conf
          configMap:
            name: launchfast-landing
            items:
              - key: nginx.conf
                path: default.conf
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
        - name: nginx-cache
          emptyDir:
            sizeLimit: 10Mi
