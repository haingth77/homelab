apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-secret
  namespace: monitoring
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/instance: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: grafana-secret
    creationPolicy: Owner
    template:
      data:
        admin-user: admin
        admin-password: "{{ .password }}"
        oauth-client-id: grafana
        oauth-client-secret: "{{ .oauthSecret }}"
  data:
    - secretKey: password
      remoteRef:
        key: GRAFANA_ADMIN_PASSWORD
    - secretKey: oauthSecret
      remoteRef:
        key: GRAFANA_OAUTH_CLIENT_SECRET
