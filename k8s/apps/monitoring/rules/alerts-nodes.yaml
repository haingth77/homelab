apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alerts-nodes
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/instance: monitoring
spec:
  groups:
    - name: nodes
      rules:
        - alert: NodeHighCPUUsage
          expr: |
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
          for: 10m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "Node {{ $labels.instance }} CPU usage is high"
            description: "CPU usage on {{ $labels.instance }} has been above 90% for 10 minutes (current: {{ $value }}%)"
            runbook_url: https://github.com/holdennguyen/homelab/tree/main/docs/runbooks#node-high-cpu-usage
        - alert: NodeHighMemoryUsage
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 10m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "Node {{ $labels.instance }} memory usage is high"
            description: "Memory usage on {{ $labels.instance }} has been above 85% for 10 minutes (current: {{ $value }}%)"
            runbook_url: https://github.com/holdennguyen/homelab/tree/main/docs/runbooks#node-high-memory-usage
        - alert: NodeHighDiskUsage
          expr: |
            (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 90
          for: 15m
          labels:
            severity: warning
            component: node
          annotations:
            summary: "Node {{ $labels.instance }} disk usage is high on {{ $labels.mountpoint }}"
            description: "Disk usage on {{ $labels.instance }} mount {{ $labels.mountpoint }} is {{ $value }}% full"
            runbook_url: https://github.com/holdennguyen/homelab/tree/main/docs/runbooks#node-high-disk-usage