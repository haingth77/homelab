apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alerts-pods
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/instance: monitoring
spec:
  groups:
    - name: pods
      rules:
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restart_total[15m]) * 60 * 5 > 0
          for: 2m
          labels:
            severity: warning
            component: pod
          annotations:
            summary: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is crash looping"
            description: "Pod {{ $labels.pod }} is restarting frequently ({{ $value }} restarts in 5 minutes)"
            runbook_url: https://github.com/holdennguyen/homelab/tree/main/docs/runbooks#pod-crashlooping
        - alert: PodOOMKilled
          expr: kube_pod_container_status_terminated_reason{reason="OOMKilled"} > 0
          for: 1m
          labels:
            severity: critical
            component: pod
          annotations:
            summary: "Pod {{ $labels.pod }} was OOMKilled"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} was terminated due to out-of-memory"
            runbook_url: https://github.com/holdennguyen/homelab/tree/main/docs/runbooks#pod-oomkilled