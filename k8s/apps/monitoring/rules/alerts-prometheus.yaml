apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: alerts-prometheus
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/instance: monitoring
spec:
  groups:
    - name: prometheus
      rules:
        - alert: PrometheusTargetMissing
          expr: up{job=~".*"} == 0
          for: 3m
          labels:
            severity: critical
            component: monitoring
          annotations:
            summary: "Prometheus target {{ $labels.job }} is down"
            description: "Target {{ $labels.job }} (instance {{ $labels.instance }}) has been down for more than 3 minutes"
            runbook_url: https://github.com/holdennguyen/homelab/tree/main/docs/runbooks#prometheus-target-missing
        - alert: PrometheusTooManyChunks
          expr: prometheus_tsdb_head_chunks > 4
          for: 5m
          labels:
            severity: warning
            component: monitoring
          annotations:
            summary: "Prometheus has too many head chunks"
            description: "Prometheus at {{ $labels.instance }} has {{ $value }} head chunks, which may cause performance issues"
            runbook_url: https://github.com/holdennguyen/homelab/tree/main/docs/runbooks#prometheus-too-many-chunks