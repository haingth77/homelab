apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
        app.kubernetes.io/instance: openclaw
    spec:
      serviceAccountName: openclaw
      initContainers:
        - name: init-workspaces
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for agent in homelab-admin devops-sre software-engineer security-analyst; do
                dir="/data/workspaces/${agent}"
                mkdir -p "${dir}"
                src="/workspace-src/${agent}/AGENTS.md"
                if [ -f "${src}" ]; then
                  cp "${src}" "${dir}/AGENTS.md"
                fi
              done
              chown -R 1000:1000 /data/workspaces
          volumeMounts:
            - name: openclaw-data
              mountPath: /data
            - name: workspace-src
              mountPath: /workspace-src
              readOnly: true
      containers:
        - name: openclaw
          image: openclaw:latest
          imagePullPolicy: Never
          command:
            - node
            - dist/index.js
            - gateway
            - --allow-unconfigured
            - --bind
            - lan
          env:
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_STATE_DIR
              value: /data
            - name: OPENCLAW_CONFIG_PATH
              value: /config/openclaw.json
            - name: OPENCLAW_PREFER_PNPM
              value: "1"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: HOME
              value: /home/node
            - name: TERM
              value: xterm-256color
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secret
                  key: GEMINI_API_KEY
          ports:
            - name: http
              containerPort: 18789
          volumeMounts:
            - name: openclaw-data
              mountPath: /data
            - name: openclaw-config
              mountPath: /config
              readOnly: true
            - name: openclaw-skills
              mountPath: /skills
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: workspace-src
          hostPath:
            path: /Users/holden.nguyen/homelab/agents/workspaces
            type: Directory
        - name: openclaw-skills
          hostPath:
            path: /Users/holden.nguyen/homelab/skills
            type: Directory
