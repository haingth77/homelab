apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-secret
  namespace: openclaw
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical
    kind: ClusterSecretStore
  target:
    name: openclaw-secret
    creationPolicy: Owner
  data:
    - secretKey: OPENCLAW_GATEWAY_TOKEN
      remoteRef:
        key: OPENCLAW_GATEWAY_TOKEN
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: OPENROUTER_API_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: GEMINI_API_KEY
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: GITHUB_TOKEN
    - secretKey: DISCORD_BOT_TOKEN
      remoteRef:
        key: DISCORD_BOT_TOKEN
    - secretKey: VIKUNJA_API_TOKEN
      remoteRef:
        key: VIKUNJA_API_TOKEN
    - secretKey: DISCORD_WEBHOOK_VIKUNJA
      remoteRef:
        key: DISCORD_WEBHOOK_VIKUNJA
    - secretKey: DISCORD_WEBHOOK_ALERTS
      remoteRef:
        key: DISCORD_WEBHOOK_ALERTS
