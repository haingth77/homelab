apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/instance: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-role
  namespace: openclaw
rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - secrets
    - configmaps
    - services
    - persistentvolumeclaims
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources:
    - pods/exec
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-rolebinding
  namespace: openclaw
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openclaw-role
subjects:
- kind: ServiceAccount
  name: openclaw
  namespace: openclaw
