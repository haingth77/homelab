apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: gitea-system
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: gitea-db
type: Opaque
data:
  POSTGRES_PASSWORD: Z2l0ZWFwYXNzd29yZA== # base64("giteapassword")
  POSTGRES_USER: Z2l0ZWE= # base64("gitea")
  POSTGRES_DB: Z2l0ZWE= # base64("gitea")
  GITEA_DB_PASSWORD: Z2l0ZWFwYXNzd29yZA== # base64("giteapassword")
