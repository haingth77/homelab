apiVersion: apps/v1
kind: Deployment
metadata:
  name: vikunja
  namespace: vikunja
  labels:
    app.kubernetes.io/name: vikunja
    app.kubernetes.io/part-of: vikunja
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vikunja
      app.kubernetes.io/part-of: vikunja
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vikunja
        app.kubernetes.io/part-of: vikunja
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
      containers:
        - name: vikunja
          image: vikunja/vikunja:1.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: VIKUNJA_DATABASE_TYPE
              value: postgres
            - name: VIKUNJA_DATABASE_HOST
              value: postgresql.vikunja.svc.cluster.local
            - name: VIKUNJA_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: vikunja-db-secret
                  key: POSTGRES_USER
            - name: VIKUNJA_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vikunja-db-secret
                  key: POSTGRES_PASSWORD
            - name: VIKUNJA_DATABASE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: vikunja-db-secret
                  key: POSTGRES_DB
            - name: VIKUNJA_SERVICE_PUBLICURL
              value: "http://vikunja.vikunja.svc.cluster.local"
            - name: VIKUNJA_SERVICE_TIMEZONE
              value: "UTC"
            - name: VIKUNJA_MAILER_ENABLED
              value: "false"
            - name: VIKUNJA_FILES_BASEPATH
              value: "/app/files"
          ports:
            - containerPort: 3456
              name: http
          livenessProbe:
            httpGet:
              path: /api/v1/info
              port: 3456
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/v1/info
              port: 3456
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: files
              mountPath: /app/files
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: files
          persistentVolumeClaim:
            claimName: vikunja-files
