site_name: Homelab Docs
site_url: https://holdennguyen.github.io/homelab/
repo_url: https://github.com/holdennguyen/homelab
repo_name: holdennguyen/homelab

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.top
    - navigation.path
    - content.code.copy
    - search.highlight
    - search.suggest

plugins:
  - search
  - include-markdown

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition
  - pymdownx.details

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Architecture: getting-started/architecture.md
      - Bootstrap: getting-started/bootstrap.md
  - Infrastructure:
      - infrastructure/index.md
      - Networking: infrastructure/networking.md
      - Security: infrastructure/security.md
      - Secret Management: infrastructure/secret-management.md
  - Services:
      - services/index.md
      - ArgoCD: services/argocd.md
      - Authentik: services/authentik.md
      - External Secrets: services/external-secrets.md
      - Infisical: services/infisical.md
      - LaunchFast: services/launchfast.md
      - Monitoring: services/monitoring.md
      - OpenClaw: services/openclaw.md
      - Trivy Operator: services/trivy-operator.md
      - Trivy Dashboard: services/trivy-dashboard.md
      - Vikunja: services/vikunja.md
  - Operations:
      - operations/index.md
      - Git Workflow: operations/git-workflow.md
      - AI Agents: operations/ai-agents.md
      - Nightly Shutdown: operations/nightly-shutdown.md
